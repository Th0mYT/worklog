# worklog configuration
# Copy this file to ~/.worklog/config.toml and fill in your values.

# Where daily .jsonl log files are stored (~ is expanded)
logs_dir = "~/.worklog/logs"

# Where generated daily summaries are saved as {date}.md (~ is expanded).
# Summaries are written here automatically and reloaded when you revisit a date.
summaries_dir = "~/.worklog/summaries"

# How often the activity poller captures a snapshot (seconds)
poll_interval = 300

# Seconds of keyboard/mouse inactivity before the poller pauses.
# Resumes automatically when input is detected again. (default: 300)
inactivity_timeout = 300

# Git author filter — matched against commit author name or email.
# Leave empty to include all authors.
git_author = "yourname"

# Absolute paths to the git repos you want enriched in daily summaries
git_repos = [
    "/Users/you/projects/repo-one",
    "/Users/you/projects/repo-two",
]

# Summarizer backend: "ollama" (default, single model) or "council" (llm-council, needs beefy hardware)
summarizer_backend = "ollama"

# Ollama settings (used when summarizer_backend = "ollama")
ollama_url   = "http://localhost:11434"
ollama_model = "qwen2.5:7b"

# llm-council API base URL (used when summarizer_backend = "council")
# https://github.com/Th0mYT/llm-council
council_url = "http://localhost:8001"

# Anthropic Messages API (used when summarizer_backend = "anthropic")
# Key is read from anthropic_api_key here, or the ANTHROPIC_API_KEY env var.
# anthropic_api_key = "sk-ant-..."
anthropic_model = "claude-haiku-4-5"

# OpenAI chat completions API (used when summarizer_backend = "openai")
# Key is read from openai_api_key here, or the OPENAI_API_KEY env var.
# openai_api_key = "sk-..."
openai_model = "gpt-4o-mini"

# App categories — each key is a category name, each value the apps logged
# under it (first match wins, case-insensitive). Editable from Settings ›
# Categories in the app; these names are also the choices when adding a record
# by hand. Omit this table to use the built-in defaults.
# [categories]
# coding        = ["Cursor", "Visual Studio Code", "PyCharm", "Terminal"]
# meeting       = ["Zoom", "Microsoft Teams", "FaceTime", "Discord"]
# browser       = ["Google Chrome", "Safari", "Firefox", "Arc"]
# design        = ["Figma", "Sketch"]
# productivity  = ["Notion", "Obsidian", "Notes"]
# communication = ["Slack", "Mail", "Telegram"]
